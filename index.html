<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Are You?</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
min-height: 100vh;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
font-family: 'Poppins', sans-serif;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}

.container {
background: white;
border-radius: 30px;
padding: 60px 40px;
box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
text-align: center;
max-width: 500px;
animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
from {
opacity: 0;
transform: translateY(30px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

h1 {
color: #333;
font-size: 42px;
margin-bottom: 15px;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.subtitle {
color: #666;
font-size: 16px;
margin-bottom: 50px;
font-weight: 400;
}

.button-group {
display: flex;
gap: 20px;
justify-content: center;
flex-wrap: wrap;
}

button {
padding: 18px 40px;
font-size: 18px;
font-weight: 600;
border: none;
border-radius: 15px;
cursor: pointer;
transition: all 0.3s ease;
font-family: 'Poppins', sans-serif;
box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
min-width: 160px;
}

.btn-okay {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
}

.btn-okay:hover {
transform: translateY(-5px);
box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
}

.btn-okay:active {
transform: translateY(-2px);
}

.btn-not-okay {
background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
color: white;
}

.btn-not-okay:hover {
transform: translateY(-5px);
box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4);
}

.btn-not-okay:active {
transform: translateY(-2px);
}

@media (max-width: 600px) {
.container {
padding: 40px 25px;
}

h1 {
font-size: 32px;
}

button {
padding: 15px 30px;
font-size: 16px;
min-width: 140px;
}

.button-group {
flex-direction: column;
}
}

.emoji {
font-size: 50px;
margin-bottom: 20px;
animation: float 3s ease-in-out infinite;
}

@keyframes float {
0%, 100% {
transform: translateY(0px);
}
50% {
transform: translateY(-10px);
}
}
</style>
</head>
<body>

<div class="container">
<div class="emoji">👋</div>
<h1>How are you?</h1>
<p class="subtitle">Let me know your status with one click</p>

<div class="button-group">
<button class="btn-okay" onclick="sendWhatsApp('Okay')">✓ Okay</button>
<button class="btn-not-okay" onclick="sendWhatsApp('Not Okay')">✗ Not Okay</button>
</div>
</div>

<script>
function sendWhatsApp(answer) {
const number = "+420722085381";
const message = encodeURIComponent("Response: " + answer);
window.location.href = `https://wa.me/${number}?text=${message}`;
}
</script>

</body>
</html>
